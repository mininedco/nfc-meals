<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Meal Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0D1117;
      --surface:     #161B22;
      --card:        #1C2333;
      --card2:       #161C27;
      --teal:        #1D9E75;
      --teal-light:  #22C78E;
      --teal-dim:    rgba(29,158,117,0.12);
      --teal-border: rgba(29,158,117,0.30);
      --teal-glow:   rgba(29,158,117,0.18);
      --white:       #EFF1F5;
      --white-dim:   rgba(239,241,245,0.55);
      --gray:        #7A8899;
      --warn:        #E8960C;
      --warn-dim:    rgba(232,150,12,0.12);
      --warn-border: rgba(232,150,12,0.30);
      --danger:      #E05252;
      --danger-dim:  rgba(224,82,82,0.12);
      --radius-lg:   20px;
      --radius-md:   14px;
      --radius-sm:   10px;
      --font:        'Lexend', system-ui, sans-serif;
    }

    html { background: var(--bg); }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 56px;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── STATUS BANNER ─────────────────────────── */
    .status-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 18px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .status-banner.eat-soon {
      background: var(--warn-dim);
      border-bottom: 1px solid var(--warn-border);
      color: var(--warn);
    }
    .status-banner.expiring {
      background: var(--danger-dim);
      border-bottom: 1px solid rgba(224,82,82,0.30);
      color: var(--danger);
    }
    .status-banner.fresh {
      background: var(--teal-dim);
      border-bottom: 1px solid var(--teal-border);
      color: var(--teal);
    }

    /* ─── TOP NAV ───────────────────────────────── */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px 0;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--teal);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .nfc-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: var(--card);
      border: 1.5px solid var(--teal-border);
      border-radius: 12px;
      padding: 7px 12px;
      font-size: 10px;
      font-weight: 800;
      color: var(--teal);
      letter-spacing: 0.08em;
      line-height: 1;
    }

    /* ─── TITLE BLOCK ───────────────────────────── */
    .title-block {
      padding: 20px 18px 0;
    }
    .meal-title {
      font-size: clamp(38px, 10vw, 48px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -1px;
      color: var(--white);
    }
    .category-pill {
      display: inline-flex;
      align-items: center;
      margin-top: 12px;
      padding: 6px 16px;
      background: var(--teal);
      color: #0D1117;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    /* ─── INFO CHIPS ROW ────────────────────────── */
    .info-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 18px 18px 0;
    }
    .info-chip {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius-md);
      padding: 12px 6px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .info-chip.freeze { border-color: var(--teal-border); background: var(--teal-dim); }
    .chip-icon { color: var(--teal); line-height: 0; }
    .chip-val {
      font-size: 12px;
      font-weight: 700;
      color: var(--white);
      text-align: center;
      line-height: 1.25;
    }
    .chip-sub {
      font-size: 10px;
      font-weight: 500;
      color: var(--gray);
      text-align: center;
      margin-top: -3px;
    }

    /* ─── SECTION LABEL ─────────────────────────── */
    .section-label {
      padding: 24px 18px 14px;
      font-size: 19px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    /* ─── REHEAT GRID ───────────────────────────── */
    .reheat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 18px;
    }

    /* ── Recommended badge on card ── */
    .reheat-card {
      background: var(--card);
      border: 1.5px solid rgba(255,255,255,0.07);
      border-radius: var(--radius-lg);
      padding: 16px 12px 14px;
      position: relative;
      overflow: hidden;
    }
    .reheat-card.recommended {
      border-color: var(--teal-border);
      background: linear-gradient(160deg, rgba(29,158,117,0.10) 0%, var(--card) 60%);
    }

    /* Star/callout banner pinned to top of recommended card */
    .rec-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: var(--teal);
      color: #0D1117;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.06em;
      padding: 4px 0;
      margin: -16px -12px 12px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .reheat-icon {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
      color: var(--teal);
      line-height: 0;
    }
    .reheat-title {
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--white);
    }
    .step-list { display: flex; flex-direction: column; gap: 6px; }
    .step-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card2);
      border-radius: var(--radius-sm);
      padding: 9px 10px;
    }
    .step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--teal);
      color: #0D1117;
      font-size: 11px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-text {
      font-size: 12.5px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--white);
    }

    /* ─── ADD AFTER HEATING ─────────────────────── */
    .fresh-row {
      display: flex;
      gap: 8px;
      padding: 0 18px;
      flex-wrap: wrap;
    }
    .fresh-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--teal-dim);
      border: 1px solid var(--teal-border);
      border-radius: 100px;
      padding: 9px 15px;
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
    }
    .fresh-chip-icon { color: var(--teal); line-height: 0; }

    /* ─── FRESHNESS SECTION ─────────────────────── */
    .freshness-section { padding: 24px 18px 0; }
    .freshness-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .freshness-title { font-size: 19px; font-weight: 700; }
    .freshness-badge {
      font-size: 13px;
      font-weight: 700;
      color: var(--teal);
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--teal-dim);
      border: 1px solid var(--teal-border);
    }
    .freshness-badge.soon {
      color: var(--warn);
      background: var(--warn-dim);
      border-color: var(--warn-border);
    }
    .freshness-badge.danger {
      color: var(--danger);
      background: var(--danger-dim);
      border-color: rgba(224,82,82,0.30);
    }
    .bar-track {
      height: 10px;
      border-radius: 100px;
      background: linear-gradient(to right, #1D9E75 0%, #8BC34A 35%, #FFC107 65%, #FF5722 100%);
      position: relative;
    }
    .bar-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--white);
      border: 2.5px solid var(--bg);
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
      transition: left 0.5s ease;
    }
    .freshness-sub {
      margin-top: 9px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .freshness-sub.fresh  { color: var(--teal); }
    .freshness-sub.soon   { color: var(--warn); }
    .freshness-sub.danger { color: var(--danger); }

    /* ─── NOTES CARD ────────────────────────────── */
    .notes-card {
      margin: 20px 18px 0;
      background: var(--card2);
      border: 1px solid var(--teal-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .notes-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .notes-toggle-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
    }
    .chevron {
      color: var(--gray);
      transition: transform 0.25s ease;
      line-height: 0;
    }
    .chevron.open { transform: rotate(180deg); }
    .notes-body {
      display: none;
      padding: 0 16px 14px;
    }
    .notes-body.open { display: block; }
    .notes-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      font-size: 13px;
      color: var(--white-dim);
      border-top: 1px solid rgba(255,255,255,0.05);
      line-height: 1.4;
    }
    .notes-row svg { color: var(--teal); flex-shrink: 0; margin-top: 1px; }

    /* ─── INGREDIENTS SECTION ───────────────────── */
    .ingredients-card {
      margin: 10px 18px 0;
      background: var(--card2);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .ingredients-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .ingredients-toggle-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
    }
    .ingredients-body {
      display: none;
      padding: 0 16px 14px;
    }
    .ingredients-body.open { display: block; }
    .ingredient-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      font-size: 13px;
      color: var(--white-dim);
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .ingredient-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal);
      flex-shrink: 0;
    }

    /* ─── ACTION ROW (NFC + QR) ──────────────── */
    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 18px 8px;
    }
    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 10px;
      background: var(--teal-dim);
      border: 1.5px solid var(--teal-border);
      border-radius: var(--radius-md);
      color: var(--teal);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
      white-space: nowrap;
    }
    .action-btn:active { background: rgba(29,158,117,0.22); }
    .action-btn.writing {
      background: rgba(29,158,117,0.08);
      border-color: var(--teal);
      animation: pulse-border 1.2s ease-in-out infinite;
    }
    .action-btn.success {
      background: var(--teal);
      border-color: var(--teal);
      color: #0D1117;
    }
    .action-btn.error {
      background: var(--danger-dim);
      border-color: rgba(224,82,82,0.40);
      color: var(--danger);
    }
    .action-hint {
      text-align: center;
      font-size: 11px;
      color: var(--gray);
      margin-top: 5px;
      font-weight: 500;
      padding: 0 18px;
    }
    .action-unsupported {
      grid-column: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      background: rgba(122,136,153,0.08);
      border: 1px solid rgba(122,136,153,0.18);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--gray);
      font-weight: 500;
    }

    /* ─── QR MODAL ──────────────────────────────── */
    .qr-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .qr-overlay.open { display: flex; }
    .qr-modal {
      background: var(--surface);
      border: 1px solid var(--teal-border);
      border-radius: var(--radius-lg);
      padding: 28px 24px 24px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 40px rgba(29,158,117,0.18);
    }
    .qr-modal-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 4px;
    }
    .qr-modal-sub {
      font-size: 12px;
      color: var(--gray);
      margin-bottom: 20px;
    }
    .qr-img-wrap {
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: 4px;
      display: inline-block;
      border: 1px solid var(--teal-border);
    }
    .qr-img-wrap img {
      display: block;
      width: 240px;
      height: 240px;
      border-radius: 10px;
    }
    .qr-url {
      margin-top: 14px;
      font-size: 11px;
      color: var(--gray);
      word-break: break-all;
      line-height: 1.5;
    }
    .qr-close {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 28px;
      background: var(--teal-dim);
      border: 1.5px solid var(--teal-border);
      border-radius: var(--radius-sm);
      color: var(--teal);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .qr-close:active { background: rgba(29,158,117,0.22); }
    .qr-print-link {
      display: block;
      margin-top: 10px;
      font-size: 12px;
      color: var(--teal);
      text-decoration: none;
      font-weight: 600;
    }

    /* ─── NFC WRITE BUTTON ────────────────────── */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes pulse-border {
      0%, 100% { border-color: var(--teal-border); }
      50%       { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(29,158,117,0.15); }
    }

    /* ─── LOADING / ERROR ───────────────────────── */
    .loading {
      text-align: center;
      padding: 100px 24px;
      color: var(--gray);
      font-size: 16px;
      line-height: 1.6;
    }
    .loading a { color: var(--teal); text-decoration: none; }
  </style>
</head>

/* ── Recommended method per recipe id ── */
const RECOMMENDED = {
  bulgogi:          'pan',
  'mongolian-beef': 'pan',
  'bo-luc-lac':     'pan',
  'broccoli-beef':  'pan',
  'tomato-beef':    'pan',
  grapow:           'wok',
  'gra-tiem':       'pan',
  'mapo-tofu':      'pot',
  'green-curry':    'pot',
  'thai-curry':     'pot',
  'tom-kha':        'pot',
  'tom-yum':        'pot',
  soondubu:         'pot',
  'thai-cabbage':   'pan',
  zucchini:         'pan',
  'pumpkin-puree':  'pot',
  'pot-pie':        'oven',
  alfredo:          'pan',
  mentaiko:         'pan',
  'japanese-curry': 'pot',
  'berry-cheesecake':'snowflake',
  'mango-coconut':  'snowflake',
  'banana-bread':   'oven',
  'pumpkin-cheesecake':'snowflake',
};

/* ── Freshness calculation ── */
function calcFreshness(meal) {
  const frozen  = new Date(meal.frozen_date + 'T00:00:00');
  const expiry  = new Date(frozen);
  expiry.setDate(expiry.getDate() + meal.expiry_weeks * 7);
  const today   = new Date(); today.setHours(0,0,0,0);
  const days    = Math.round((expiry - today) / 86400000);
  const maxDays = meal.expiry_weeks * 7;
  const pct     = Math.max(0, Math.min(100, (days / maxDays) * 100));
  const state   = days <= 0 ? 'danger' : days <= 7 ? 'danger' : days <= 21 ? 'soon' : 'fresh';
  const label   = days <= 0 ? 'Expired' : days === 1 ? '1 day left' : `${days} days left`;
  const badge   = state === 'danger' ? 'Expiring!' : state === 'soon' ? 'Eat Soon' : 'Fresh';
  return { days, pct, state, label, badge };
}

/* ── Render ── */
function render(meal) {
  const f = calcFreshness(meal);
  const recMethod = RECOMMENDED[meal.id] || 'pan';
  const frozenFmt = new Date(meal.frozen_date + 'T00:00:00')
    .toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  document.title = meal.name;

  /* Status banner */
  let bannerHTML = '';
  if (f.state === 'danger') {
    bannerHTML = `<div class="status-banner expiring">${I.warn} Expiring — eat within ${f.days} day${f.days !== 1 ? 's' : ''}</div>`;
  } else if (f.state === 'soon') {
    bannerHTML = `<div class="status-banner eat-soon">${I.warn} Eat within ${f.days} days</div>`;
  }

  /* Info chips */
  const chipsHTML = `
    <div class="info-row">
      <div class="info-chip">
        <span class="chip-icon">${I.fork}</span>
        <span class="chip-val">${meal.portion}</span>
        <span class="chip-sub">portion</span>
      </div>
      <div class="info-chip">
        <span class="chip-icon">${I.flame}</span>
        <span class="chip-val">${meal.calories}</span>
        <span class="chip-sub">cal</span>
      </div>
      <div class="info-chip">
        <span class="chip-icon">${I.muscle}</span>
        <span class="chip-val">${meal.protein}g</span>
        <span class="chip-sub">protein</span>
      </div>
      <div class="info-chip freeze">
        <span class="chip-icon">${I.snow}</span>
        <span class="chip-val">Frozen</span>
        <span class="chip-sub">${frozenFmt}</span>
      </div>
    </div>`;

  /* Reheat cards — microwave always left, method2 always right */
  const isRecMicrowave = recMethod === 'microwave';
  const isRecMethod2   = recMethod === meal.reheat_method2_icon;

  function buildCard(icon, title, steps, isRec) {
    const banner = isRec
      ? `<div class="rec-banner">${I.star} Recommended ${I.star}</div>`
      : '';
    return `
      <div class="reheat-card${isRec ? ' recommended' : ''}">
        ${banner}
        <div class="reheat-icon">${I[icon] || I.pan}</div>
        <p class="reheat-title">${title}</p>
        <div class="step-list">
          ${steps.map((s, i) => `
            <div class="step-row">
              <span class="step-num">${i + 1}</span>
              <span class="step-text">${s}</span>
            </div>`).join('')}
        </div>
      </div>`;
  }

  const reheatHTML = `
    <p class="section-label">How to Reheat</p>
    <div class="reheat-grid">
      ${buildCard('microwave', 'Microwave', meal.reheat_microwave, isRecMicrowave)}
      ${buildCard(meal.reheat_method2_icon || 'pan', meal.reheat_method2_label, meal.reheat_method2, isRecMethod2)}
    </div>`;

  /* Add after heating */
  const freshHTML = `
    <p class="section-label">Add After Heating</p>
    <div class="fresh-row">
      ${meal.add_fresh.map(f => `
        <div class="fresh-chip">
          <span class="fresh-chip-icon">${I[f.icon] || I.leaf}</span>
          ${f.label}
        </div>`).join('')}
    </div>`;

  /* Freshness bar */
  const freshnessHTML = `
    <div class="freshness-section">
      <div class="freshness-top">
        <span class="freshness-title">Freshness</span>
        <span class="freshness-badge ${f.state}">${f.badge}</span>
      </div>
      <div class="bar-track">
        <div class="bar-dot" style="left:${f.pct}%"></div>
      </div>
      <p class="freshness-sub ${f.state}">
        ${f.state !== 'fresh' ? I.warn : I.check}
        ${f.label}
      </p>
    </div>`;

  /* Notes card */
  const notesHTML = `
    <div class="notes-card">
      <div class="notes-toggle" onclick="toggleCollapse(this)">
        <div class="notes-toggle-left">${I.notes} Notes</div>
        <span class="chevron">${I.chevron}</span>
      </div>
      <div class="notes-body">
        <div class="notes-row">${I.contains} Contains: ${meal.contains}</div>
        <div class="notes-row">${I.spiceico} Spice level: ${meal.spice}</div>
        ${meal.allergens && meal.allergens.length ? `<div class="notes-row">${I.warn} Allergens: ${meal.allergens.join(', ')}</div>` : ''}
      </div>
    </div>`;

  /* Ingredients card */
  const ingredientsHTML = meal.ingredients && meal.ingredients.length ? `
    <div class="ingredients-card">
      <div class="ingredients-toggle" onclick="toggleCollapse(this)">
        <div class="ingredients-toggle-left">${I.list} Ingredients</div>
        <span class="chevron">${I.chevron}</span>
      </div>
      <div class="ingredients-body">
        ${meal.ingredients.map(ing => `
          <div class="ingredient-item">
            <span class="ingredient-dot"></span>
            ${ing}
          </div>`).join('')}
      </div>
    </div>` : '';

  /* Action row (NFC + QR) */
  const tagUrl = `${location.origin}${location.pathname}?id=${meal.id}`;
  const nfcSectionHTML = buildActionRow(meal, tagUrl);

  return `
    ${bannerHTML}
    <nav class="top-nav">
      <a href="index.html" class="back-btn">${I.back} Freezer</a>
      <div class="nfc-badge">${I.nfc} NFC</div>
    </nav>
    <div class="title-block">
      <h1 class="meal-title">${meal.name}</h1>
      <span class="category-pill">${meal.category}</span>
    </div>
    ${chipsHTML}
    ${nfcSectionHTML}
    ${reheatHTML}
    ${freshHTML}
    ${freshnessHTML}
    ${notesHTML}
    ${ingredientsHTML}
  `;
}

/* ── Action Row: NFC Write + QR Code ── */
function buildActionRow(meal, tagUrl) {
  const nfcSupported = 'NDEFReader' in window;
  const nfcBtn = nfcSupported
    ? `<button class="action-btn" id="nfcWriteBtn" onclick="startNfcWrite('${tagUrl}')">${I.nfcwrite} Write NFC</button>`
    : `<div class="action-unsupported">${I.nfc} NFC: Android Chrome only</div>`;

  const qrBtn = `<button class="action-btn" onclick="openQrModal('${meal.id}','${meal.name}','${tagUrl}')">${I.qricon} Show QR</button>`;

  return `
    <div class="action-row">
      ${nfcBtn}
      ${qrBtn}
    </div>
    <p class="action-hint" id="nfcHint">${nfcSupported ? 'Hold NTAG213 to phone after tapping Write NFC' : 'Use NFC Tools app on iOS to write tags'}</p>
    <div class="qr-overlay" id="qrOverlay" onclick="closeQrModal(event)">
      <div class="qr-modal">
        <p class="qr-modal-title" id="qrModalTitle"></p>
        <p class="qr-modal-sub">Scan to open this meal card</p>
        <div class="qr-img-wrap">
          <img id="qrModalImg" src="" alt="QR Code" />
        </div>
        <p class="qr-url" id="qrModalUrl"></p>
        <a class="qr-print-link" href="qr.html" target="_blank">View all QR codes →</a>
        <button class="qr-close" onclick="closeQrModal()">Close</button>
      </div>
    </div>`;
}

async function startNfcWrite(tagUrl) {
  const btn  = document.getElementById('nfcWriteBtn');
  const hint = document.getElementById('nfcHint');
  if (!btn) return;

  // Guard: already writing
  if (btn.dataset.writing === 'true') return;
  btn.dataset.writing = 'true';

  // Writing state
  btn.className = 'nfc-write-btn writing';
  btn.innerHTML = `${I.nfcspin} Hold tag to back of phone…`;
  hint.textContent = 'Keep the tag still until confirmed';

  try {
    const ndef = new NDEFReader();
    // Timeout after 30s
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);

    await ndef.write(
      { records: [{ recordType: 'url', data: tagUrl }] },
      { signal: controller.signal }
    );
    clearTimeout(timeout);

    // Success state
    btn.className = 'nfc-write-btn success';
    btn.innerHTML = `${I.nfccheck} Tag written successfully!`;
    hint.textContent = tagUrl;
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

    // Reset after 4s
    setTimeout(() => {
      btn.className = 'nfc-write-btn';
      btn.innerHTML = `${I.nfcwrite} Write NFC Tag`;
      hint.textContent = 'Programs a blank NTAG213 tag with this meal\'s URL';
      btn.dataset.writing = 'false';
    }, 4000);

  } catch (err) {
    btn.dataset.writing = 'false';
    if (err.name === 'AbortError') {
      btn.className = 'nfc-write-btn error';
      btn.innerHTML = `${I.nfcerr} Timed out — try again`;
      hint.textContent = 'No tag detected within 30 seconds';
    } else if (err.name === 'NotAllowedError') {
      btn.className = 'nfc-write-btn error';
      btn.innerHTML = `${I.nfcerr} Permission denied`;
      hint.textContent = 'Allow NFC access when prompted';
    } else {
      btn.className = 'nfc-write-btn error';
      btn.innerHTML = `${I.nfcerr} Write failed — try again`;
      hint.textContent = err.message || 'Unknown error';
    }
    // Reset after 5s
    setTimeout(() => {
      btn.className = 'nfc-write-btn';
      btn.innerHTML = `${I.nfcwrite} Write NFC Tag`;
      hint.textContent = 'Programs a blank NTAG213 tag with this meal\'s URL';
    }, 5000);
  }
}

/* ── QR Modal ── */
function openQrModal(id, name, url) {
  document.getElementById('qrModalTitle').textContent = name;
  document.getElementById('qrModalImg').src = `qr/qr_${id}.png`;
  document.getElementById('qrModalUrl').textContent = url;
  document.getElementById('qrOverlay').classList.add('open');
}
function closeQrModal(e) {
  if (e && e.target !== document.getElementById('qrOverlay') && !e.target.classList.contains('qr-close')) return;
  document.getElementById('qrOverlay').classList.remove('open');
}

function toggleCollapse(toggle) {
  const body    = toggle.nextElementSibling;
  const chevron = toggle.querySelector('.chevron');
  body.classList.toggle('open');
  chevron.classList.toggle('open');
}

async function init() {
  const id  = new URLSearchParams(location.search).get('id');
  const app = document.getElementById('app');
  try {
    const meals = await fetch('meals.json').then(r => r.json());
    const meal  = meals.find(m => m.id === id);
    if (!meal) {
      app.innerHTML = `<div class="loading">Meal not found.<br><a href="index.html">← Back to freezer</a></div>`;
      return;
    }
    app.innerHTML = render(meal);
  } catch (e) {
    app.innerHTML = `<div class="loading">Could not load meals.<br><a href="index.html">← Back to freezer</a></div>`;
  }
}

init();
