<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Meal Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D1117;
      --surface: #161B22;
      --card: #1E2530;
      --card2: #1A2028;
      --teal: #1D9E75;
      --teal-dim: #0D2E22;
      --teal-border: rgba(29,158,117,0.35);
      --blue: #2A8A8A;
      --white: #F0EDE8;
      --gray: #8B9BAA;
      --warn: #E8960C;
      --danger: #E05252;
      --radius: 18px;
      --font: 'Lexend', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font);
      min-height: 100vh;
      padding-bottom: 48px;
    }

    /* ── Warning banner ── */
    .warn-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(29,158,117,0.12);
      border-bottom: 1px solid var(--teal-border);
      font-size: 14px;
      font-weight: 600;
      color: var(--teal);
    }
    .warn-banner.show { display: flex; }
    .warn-banner.danger {
      background: rgba(224,82,82,0.12);
      border-color: rgba(224,82,82,0.3);
      color: var(--danger);
    }

    /* ── Back nav ── */
    .back-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 0;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--teal);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .nfc-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--card);
      border: 1px solid var(--teal-border);
      border-radius: 10px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 700;
      color: var(--teal);
      font-family: var(--font);
    }

    /* ── Title block ── */
    .title-block { padding: 18px 20px 0; }
    .meal-title {
      font-size: 36px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.5px;
    }
    .category-tag {
      display: inline-block;
      margin-top: 10px;
      padding: 5px 14px;
      background: var(--teal);
      color: #0D1117;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
    }

    /* ── Info chips ── */
    .info-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 18px 20px 0;
    }
    .info-chip {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .info-chip.freeze-chip { border-color: var(--teal-border); }
    .chip-icon { color: var(--teal); }
    .chip-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--white);
      text-align: center;
      line-height: 1.2;
    }

    /* ── Section header ── */
    .section-header {
      padding: 22px 20px 12px;
      font-size: 18px;
      font-weight: 700;
    }

    /* ── Reheat cards ── */
    .reheat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 20px;
    }
    .reheat-card {
      background: var(--card);
      border: 1px solid var(--teal-border);
      border-radius: var(--radius);
      padding: 16px 12px;
    }
    .reheat-icon {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
      color: var(--teal);
    }
    .reheat-title {
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .step-list { display: flex; flex-direction: column; gap: 6px; }
    .step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card2);
      border-radius: 10px;
      padding: 8px 10px;
    }
    .step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--teal);
      color: #0D1117;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-text { font-size: 13px; font-weight: 600; line-height: 1.3; }

    /* ── Add fresh ── */
    .fresh-chips {
      display: flex;
      gap: 8px;
      padding: 0 20px;
      flex-wrap: wrap;
    }
    .fresh-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--teal-dim);
      border: 1px solid var(--teal-border);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
    }
    .fresh-chip-icon { color: var(--teal); }

    /* ── Freshness bar ── */
    .freshness-section { padding: 22px 20px 0; }
    .freshness-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .freshness-label { font-size: 18px; font-weight: 700; }
    .freshness-status { font-size: 14px; font-weight: 700; color: var(--teal); }
    .freshness-status.soon   { color: var(--warn); }
    .freshness-status.danger { color: var(--danger); }
    .bar-track {
      height: 10px;
      border-radius: 10px;
      background: linear-gradient(to right, #1D9E75, #8BC34A, #FFC107, #FF5722);
      position: relative;
    }
    .bar-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--white);
      border: 2px solid var(--bg);
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
    }
    .freshness-sub {
      margin-top: 8px;
      font-size: 13px;
      color: var(--teal);
      font-weight: 600;
    }
    .freshness-sub.soon   { color: var(--warn); }
    .freshness-sub.danger { color: var(--danger); }

    /* ── Notes card ── */
    .notes-card {
      margin: 18px 20px 0;
      background: var(--card2);
      border: 1px solid var(--teal-border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .notes-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .notes-toggle-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
    }
    .notes-chevron {
      color: var(--gray);
      transition: transform 0.2s;
    }
    .notes-chevron.open { transform: rotate(180deg); }
    .notes-body { display: none; padding: 0 16px 14px; }
    .notes-body.open { display: block; }
    .notes-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      font-size: 13px;
      color: var(--gray);
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .notes-row svg { color: var(--teal); flex-shrink: 0; }

    /* ── Loading / error ── */
    .loading { text-align: center; padding: 80px 20px; color: var(--gray); font-size: 16px; }
  </style>
</head>
<body>

<div id="app"><div class="loading">Loading…</div></div>

<script>
const FRESH_ICONS = {
  leaf:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 22c1-4 4-8 10-10C18 10 22 6 22 2c-4 0-8 4-10 10C10 18 6 21 2 22z"/></svg>`,
  herb:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="22" x2="12" y2="10"/><path d="M12 10C12 6 9 3 5 3c0 4 3 7 7 7z"/><path d="M12 10c0-4 3-7 7-7 0 4-3 7-7 7z"/></svg>`,
  seed:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`,
  egg:     `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2C8 2 4 8 4 14a8 8 0 0016 0c0-6-4-12-8-12z"/></svg>`,
  bowl:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 11h16a8 8 0 01-16 0z"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>`,
  lime:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="21"/><path d="M3 12h18"/></svg>`,
  mushroom:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 12c0-4.4 3.6-8 8-8s8 3.6 8 8H4z"/><path d="M9 12v6a3 3 0 006 0v-6"/></svg>`,
  shrimp:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 18c0-6 6-10 12-8"/><path d="M6 18c2 0 4-1 5-3"/><path d="M11 15c1-2 3-3 5-2"/></svg>`,
  pasta:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M3 12h18M3 18h18"/></svg>`,
  nori:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`,
  tofu:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>`,
  chili:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2c0 4-4 6-4 10a4 4 0 008 0c0-4-4-6-4-10z"/></svg>`,
  pickle:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><ellipse cx="12" cy="12" rx="4" ry="9"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="15" x2="16" y2="15"/></svg>`,
  oil:     `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 3h6l1 9H8L9 3z"/><path d="M8 12c0 4 8 4 8 0"/><line x1="12" y1="12" x2="12" y2="21"/></svg>`,
  pastry:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 20h16l-2-10H6L4 20z"/><path d="M8 10V7a4 4 0 018 0v3"/></svg>`,
  pepper:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="22"/></svg>`,
};

const METHOD_ICONS = {
  pan:  `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h14a2 2 0 010 4H3"/><line x1="17" y1="14" x2="21" y2="14"/><path d="M5 8c0-1.1.9-2 2-2h6a2 2 0 012 2v4H5V8z"/></svg>`,
  wok:  `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14c0 3.3 3.6 6 8 6s8-2.7 8-6H4z"/><path d="M4 14c0-2 3.6-4 8-4s8 2 8 4"/><line x1="20" y1="14" x2="23" y2="11"/><path d="M8 6c0-1 1-2 2-2"/><path d="M12 4c0-1 1-2 2-2"/></svg>`,
  pot:  `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8h12l-1 10H7L6 8z"/><path d="M4 8h16"/><path d="M9 4v4M15 4v4"/></svg>`,
  oven: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><rect x="6" y="9" width="12" height="9" rx="1"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="10" y1="6" x2="10.01" y2="6"/><line x1="14" y1="6" x2="14.01" y2="6"/></svg>`,
  microwave: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><rect x="5" y="8" width="10" height="8" rx="1"/><line x1="18" y1="9" x2="18.01" y2="9"/><line x1="18" y1="12" x2="18.01" y2="12"/><line x1="18" y1="15" x2="18.01" y2="15"/></svg>`,
};

const INFO_ICONS = {
  fork:  `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="2" x2="8" y2="10"/><path d="M5 2v4a3 3 0 006 0V2"/><line x1="8" y1="10" x2="8" y2="22"/><line x1="16" y1="2" x2="16" y2="22"/></svg>`,
  flame: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2c0 6-6 8-6 14a6 6 0 0012 0c0-6-6-8-6-14z"/></svg>`,
  muscle:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6.5 6.5c0-1.1.9-2 2-2h7c1.1 0 2 .9 2 2v1c0 1.1-.9 2-2 2h-7c-1.1 0-2-.9-2-2v-1z"/><path d="M6.5 7.5v9a2 2 0 004 0v-4h3v4a2 2 0 004 0v-9"/></svg>`,
  snow:  `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 7l-5 5-5-5"/><path d="M17 17l-5-5-5 5"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M7 7l5 5 5-5"/><path d="M7 17l5-5 5 5"/></svg>`,
};

function daysLeft(meal) {
  const frozen = new Date(meal.frozen_date);
  const expiry = new Date(frozen);
  expiry.setDate(expiry.getDate() + meal.expiry_weeks * 7);
  const today = new Date();
  today.setHours(0,0,0,0);
  return Math.round((expiry - today) / 86400000);
}

function barPosition(days, maxDays) {
  const pct = Math.max(0, Math.min(100, (days / maxDays) * 100));
  return pct;
}

function render(meal) {
  const days = daysLeft(meal);
  const maxDays = meal.expiry_weeks * 7;
  const pct = barPosition(days, maxDays);
  const status = days <= 7 ? 'danger' : days <= 21 ? 'soon' : 'fresh';
  const daysLabel = days <= 0 ? 'Expired' : days === 1 ? '1 day left' : `${days} days left`;
  const statusText = status === 'danger' ? 'Expiring!' : status === 'soon' ? 'Eat Soon' : 'Fresh';
  const frozenFmt = new Date(meal.frozen_date + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric'});

  const warnHTML = status !== 'fresh' ? `
    <div class="warn-banner show ${status === 'danger' ? 'danger' : ''}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      ${status === 'danger' ? `Expiring — eat within ${days} day${days !== 1 ? 's' : ''}` : `Eat within ${days} days`}
    </div>` : '';

  const freshChipsHTML = meal.add_fresh.map(f => `
    <div class="fresh-chip">
      <span class="fresh-chip-icon">${FRESH_ICONS[f.icon] || FRESH_ICONS.leaf}</span>
      ${f.label}
    </div>`).join('');

  const method2Icon = METHOD_ICONS[meal.reheat_method2_icon] || METHOD_ICONS.pan;

  document.title = meal.name;

  return `
    ${warnHTML}
    <div class="back-nav">
      <a href="index.html" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Freezer
      </a>
      <div class="nfc-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 6l4 4-4 4"/><path d="M5 10h14"/><path d="M19 6l4 4-4 4"/></svg>
        NFC
      </div>
    </div>

    <div class="title-block">
      <h1 class="meal-title">${meal.name}</h1>
      <span class="category-tag">${meal.category}</span>
    </div>

    <div class="info-row">
      <div class="info-chip">
        <span class="chip-icon">${INFO_ICONS.fork}</span>
        <span class="chip-label">${meal.portion}</span>
      </div>
      <div class="info-chip">
        <span class="chip-icon">${INFO_ICONS.flame}</span>
        <span class="chip-label">${meal.calories} cal</span>
      </div>
      <div class="info-chip">
        <span class="chip-icon">${INFO_ICONS.muscle}</span>
        <span class="chip-label">${meal.protein}g protein</span>
      </div>
      <div class="info-chip freeze-chip">
        <span class="chip-icon">${INFO_ICONS.snow}</span>
        <span class="chip-label">Frozen ${frozenFmt}</span>
      </div>
    </div>

    <p class="section-header">How to Reheat</p>
    <div class="reheat-grid">
      <div class="reheat-card">
        <div class="reheat-icon">${METHOD_ICONS.microwave}</div>
        <p class="reheat-title">Microwave</p>
        <div class="step-list">
          ${meal.reheat_microwave.map((s,i) => `
            <div class="step-item">
              <span class="step-num">${i+1}</span>
              <span class="step-text">${s}</span>
            </div>`).join('')}
        </div>
      </div>
      <div class="reheat-card">
        <div class="reheat-icon">${method2Icon}</div>
        <p class="reheat-title">${meal.reheat_method2_label}</p>
        <div class="step-list">
          ${meal.reheat_method2.map((s,i) => `
            <div class="step-item">
              <span class="step-num">${i+1}</span>
              <span class="step-text">${s}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <p class="section-header">Add After Heating</p>
    <div class="fresh-chips">${freshChipsHTML}</div>

    <div class="freshness-section">
      <div class="freshness-header">
        <span class="freshness-label">Freshness</span>
        <span class="freshness-status ${status}">${statusText}</span>
      </div>
      <div class="bar-track">
        <div class="bar-dot" style="left:${pct}%"></div>
      </div>
      <p class="freshness-sub ${status}">${daysLabel}</p>
    </div>

    <div class="notes-card">
      <div class="notes-toggle" onclick="toggleNotes(this)">
        <div class="notes-toggle-left">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Notes
        </div>
        <svg class="notes-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="notes-body">
        <div class="notes-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2v-4M9 21H5a2 2 0 01-2-2v-4m0 0h18"/></svg>
          Contains: ${meal.contains}
        </div>
        <div class="notes-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2c0 4-4 6-4 10a4 4 0 008 0c0-4-4-6-4-10z"/></svg>
          Spice level: ${meal.spice}
        </div>
      </div>
    </div>
  `;
}

function toggleNotes(toggle) {
  const body = toggle.nextElementSibling;
  const chevron = toggle.querySelector('.notes-chevron');
  body.classList.toggle('open');
  chevron.classList.toggle('open');
}

async function init() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const app = document.getElementById('app');

  try {
    const res = await fetch('meals.json');
    const meals = await res.json();
    const meal = meals.find(m => m.id === id);
    if (!meal) {
      app.innerHTML = `<div class="loading">Meal not found.<br><a href="index.html" style="color:#1D9E75">← Back to freezer</a></div>`;
      return;
    }
    app.innerHTML = render(meal);
  } catch(e) {
    app.innerHTML = `<div class="loading">Could not load meals.json</div>`;
  }
}

init();
</script>
</body>
</html>
