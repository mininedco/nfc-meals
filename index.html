<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>My Freezer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0D1117; --surface:#161B22; --card:#1C2333; --card2:#161C27;
      --teal:#1D9E75; --teal-dim:rgba(29,158,117,0.12); --teal-border:rgba(29,158,117,0.30);
      --white:#EFF1F5; --white-dim:rgba(239,241,245,0.55); --gray:#7A8899;
      --warn:#E8960C; --warn-dim:rgba(232,150,12,0.14); --warn-border:rgba(232,150,12,0.35);
      --danger:#E05252; --danger-dim:rgba(224,82,82,0.12); --danger-border:rgba(224,82,82,0.30);
      --radius-lg:20px; --radius-md:14px; --radius-sm:10px;
      --font:'Lexend',system-ui,sans-serif;
    }
    html { background: var(--bg); }
    body { background:var(--bg); color:var(--white); font-family:var(--font); min-height:100vh; max-width:430px; margin:0 auto; padding-bottom:40px; -webkit-font-smoothing:antialiased; }

    .header { padding:24px 18px 0; display:flex; align-items:flex-start; justify-content:space-between; }
    .header-title { font-size:clamp(36px,10vw,46px); font-weight:800; letter-spacing:-1.5px; line-height:1.0; color:var(--white); }
    .header-sub { font-size:14px; font-weight:500; color:var(--gray); margin-top:5px; }
    .nfc-badge { display:flex; flex-direction:column; align-items:center; gap:2px; background:var(--card); border:1.5px solid var(--teal-border); border-radius:12px; padding:7px 12px; font-size:10px; font-weight:800; color:var(--teal); letter-spacing:0.08em; line-height:1; flex-shrink:0; margin-top:4px; }

    .stats-row { display:flex; gap:8px; padding:18px 18px 0; flex-wrap:wrap; }
    .stat-chip { display:flex; align-items:center; gap:7px; padding:10px 14px; border-radius:100px; font-size:13px; font-weight:700; white-space:nowrap; }
    .stat-chip.total { background:var(--teal-dim); border:1.5px solid var(--teal-border); color:var(--teal); }
    .stat-chip.expiring { background:var(--warn-dim); border:1.5px solid var(--warn-border); color:var(--warn); }
    .stat-chip.surprise { background:var(--teal); color:#0D1117; border:none; cursor:pointer; text-decoration:none; -webkit-tap-highlight-color:transparent; transition:opacity 0.15s; }
    .stat-chip.surprise:active { opacity:0.8; }

    .filter-scroll { overflow-x:auto; padding:16px 18px 0; scrollbar-width:none; }
    .filter-scroll::-webkit-scrollbar { display:none; }
    .filter-tabs { display:flex; gap:8px; width:max-content; }
    .filter-tab { padding:8px 16px; border-radius:100px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; border:1.5px solid rgba(255,255,255,0.10); background:var(--card); color:var(--white-dim); -webkit-tap-highlight-color:transparent; transition:all 0.15s; user-select:none; }
    .filter-tab.active { background:var(--teal); border-color:var(--teal); color:#0D1117; }

    .section-divider { padding:20px 18px 10px; font-size:11px; font-weight:700; letter-spacing:0.10em; text-transform:uppercase; color:var(--gray); display:flex; align-items:center; gap:6px; }
    .section-divider svg { flex-shrink:0; }

    .cards-list { padding:0 18px; display:flex; flex-direction:column; gap:10px; }

    .meal-card { background:var(--card); border-radius:var(--radius-lg); border:1.5px solid rgba(255,255,255,0.07); overflow:hidden; text-decoration:none; display:block; -webkit-tap-highlight-color:transparent; transition:transform 0.12s,border-color 0.12s; }
    .meal-card:active { transform:scale(0.985); }
    .meal-card.expiring { border-color:var(--warn-border); }
    .meal-card.danger { border-color:var(--danger-border); }

    .card-inner { display:flex; align-items:stretch; }
    .card-strip { width:4px; flex-shrink:0; }
    .card-strip.teal { background:var(--teal); }
    .card-strip.warn { background:var(--warn); }
    .card-strip.danger { background:var(--danger); }

    .card-body { flex:1; padding:14px 14px 12px; }
    .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
    .card-name { font-size:19px; font-weight:700; color:var(--white); line-height:1.15; letter-spacing:-0.3px; }
    .card-days { font-size:12px; font-weight:700; white-space:nowrap; display:flex; align-items:center; gap:4px; flex-shrink:0; margin-top:2px; }
    .card-days.teal { color:var(--teal); }
    .card-days.warn { color:var(--warn); }
    .card-days.danger { color:var(--danger); }

    .card-category { display:inline-flex; align-items:center; margin-top:6px; padding:3px 10px; background:var(--teal-dim); border:1px solid var(--teal-border); border-radius:100px; font-size:11px; font-weight:600; color:var(--teal); }

    .card-chips { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
    .mini-chip { display:flex; align-items:center; gap:5px; background:var(--card2); border-radius:var(--radius-sm); padding:5px 9px; font-size:11.5px; font-weight:600; color:var(--white-dim); }
    .mini-chip svg { color:var(--teal); flex-shrink:0; }

    .card-bar-wrap { margin-top:10px; }
    .card-bar-track { height:4px; border-radius:100px; background:linear-gradient(to right,#1D9E75 0%,#8BC34A 35%,#FFC107 65%,#FF5722 100%); position:relative; }
    .card-bar-dot { width:10px; height:10px; border-radius:50%; background:var(--white); border:1.5px solid var(--bg); position:absolute; top:50%; transform:translate(-50%,-50%); }

    .empty-state { text-align:center; padding:60px 24px; color:var(--gray); font-size:15px; line-height:1.6; }
    .loading { text-align:center; padding:80px 24px; color:var(--gray); font-size:15px; }
  </style>
</head>
<body>
<div id="app"><div class="loading">Loading…</div></div>
<script>
const I = {
  snow:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 7l-5 5-5-5"/><path d="M17 17l-5-5-5 5"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M7 7l5 5 5-5"/><path d="M7 17l5-5 5 5"/></svg>`,
  warn:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  dice:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8" cy="8" r="1.2" fill="currentColor"/><circle cx="16" cy="8" r="1.2" fill="currentColor"/><circle cx="8" cy="16" r="1.2" fill="currentColor"/><circle cx="16" cy="16" r="1.2" fill="currentColor"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/></svg>`,
  nfc:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 6l4 4-4 4"/><path d="M5 10h14"/><path d="M19 6l4 4-4 4"/></svg>`,
  fork:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="2" x2="8" y2="10"/><path d="M5 2v4a3 3 0 006 0V2"/><line x1="8" y1="10" x2="8" y2="22"/><line x1="16" y1="2" x2="16" y2="22"/></svg>`,
  flame:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2c0 6-6 8-6 14a6 6 0 0012 0c0-6-6-8-6-14z"/></svg>`,
  muscle:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6.5 6.5c0-1.1.9-2 2-2h7c1.1 0 2 .9 2 2v1c0 1.1-.9 2-2 2h-7c-1.1 0-2-.9-2-2v-1z"/><path d="M6.5 7.5v9a2 2 0 004 0v-4h3v4a2 2 0 004 0v-9"/></svg>`,
  check:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
};

const FILTERS = ['All','Expiring','Korean','Thai','Japanese','Vietnamese','Pasta','Dessert'];
const CUISINE_MAP = {
  'Korean':    ['bulgogi','mongolian-beef','broccoli-beef','soondubu','bo-luc-lac'],
  'Thai':      ['grapow','gra-tiem','thai-curry','tom-kha','tom-yum','thai-cabbage','green-curry'],
  'Japanese':  ['japanese-curry','mentaiko'],
  'Vietnamese':['bo-luc-lac'],
  'Pasta':     ['alfredo','mentaiko'],
  'Dessert':   ['berry-cheesecake','mango-coconut','banana-bread','pumpkin-cheesecake','pumpkin-puree'],
};

let allMeals=[], activeFilter='All';

function calcFreshness(meal){
  const frozen=new Date(meal.frozen_date+'T00:00:00');
  const expiry=new Date(frozen);
  expiry.setDate(expiry.getDate()+meal.expiry_weeks*7);
  const today=new Date(); today.setHours(0,0,0,0);
  const days=Math.round((expiry-today)/86400000);
  const maxDays=meal.expiry_weeks*7;
  const pct=Math.max(0,Math.min(100,(days/maxDays)*100));
  const state=days<=0?'danger':days<=7?'danger':days<=21?'warn':'teal';
  const label=days<=0?'Expired':days===1?'1 day left':`${days} days left`;
  return{days,pct,state,label};
}

function getFiltered(){
  if(activeFilter==='All') return allMeals;
  if(activeFilter==='Expiring') return allMeals.filter(m=>calcFreshness(m).days<=21);
  const ids=CUISINE_MAP[activeFilter]||[];
  return allMeals.filter(m=>ids.includes(m.id));
}

function renderCard(meal){
  const f=calcFreshness(meal);
  const cardClass=f.state==='teal'?'fresh':f.state==='warn'?'expiring':'danger';
  const warnIcon=f.state!=='teal'?I.warn:I.check;
  return `<a class="meal-card ${cardClass}" href="meal.html?id=${meal.id}">
    <div class="card-inner">
      <div class="card-strip ${f.state}"></div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-name">${meal.name}</span>
          <span class="card-days ${f.state}">${warnIcon} ${f.label}</span>
        </div>
        <span class="card-category">${meal.category}</span>
        <div class="card-chips">
          <span class="mini-chip">${I.fork} ${meal.portion}</span>
          <span class="mini-chip">${I.flame} ${meal.calories} cal</span>
          <span class="mini-chip">${I.muscle} ${meal.protein}g protein</span>
        </div>
        <div class="card-bar-wrap">
          <div class="card-bar-track"><div class="card-bar-dot" style="left:${f.pct}%"></div></div>
        </div>
      </div>
    </div>
  </a>`;
}

function render(){
  const filtered=getFiltered();
  const expiringCount=allMeals.filter(m=>calcFreshness(m).days<=21).length;
  const expiring=filtered.filter(m=>calcFreshness(m).days<=21);
  const fresh=filtered.filter(m=>calcFreshness(m).days>21);
  const filterTabsHTML=FILTERS.map(f=>`<div class="filter-tab${f===activeFilter?' active':''}" data-filter="${f}">${f}</div>`).join('');
  let cardsHTML='';
  if(filtered.length===0){
    cardsHTML=`<div class="empty-state">No meals in this category.</div>`;
  } else {
    if(expiring.length>0){
      cardsHTML+=`<div class="section-divider">${I.warn} Eat soon — ${expiring.length} meal${expiring.length>1?'s':''}</div><div class="cards-list">${expiring.map(renderCard).join('')}</div>`;
    }
    if(fresh.length>0){
      cardsHTML+=`<div class="section-divider">${I.check} Fresh — ${fresh.length} meal${fresh.length>1?'s':''}</div><div class="cards-list">${fresh.map(renderCard).join('')}</div>`;
    }
  }
  document.getElementById('app').innerHTML=`
    <div class="header">
      <div class="header-left">
        <h1 class="header-title">My Freezer</h1>
        <p class="header-sub">Sorted by expiration</p>
      </div>
      <div class="nfc-badge">${I.nfc} NFC</div>
    </div>
    <div class="stats-row">
      <div class="stat-chip total">${I.snow} ${allMeals.length} meals</div>
      ${expiringCount>0?`<div class="stat-chip expiring">${I.warn} ${expiringCount} expiring</div>`:''}
      <a class="stat-chip surprise" href="random.html">${I.dice} Surprise Me</a>
    </div>
    <div class="filter-scroll"><div class="filter-tabs" id="filterTabs">${filterTabsHTML}</div></div>
    ${cardsHTML}`;
  document.getElementById('filterTabs').querySelectorAll('.filter-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{ activeFilter=tab.dataset.filter; render(); });
  });
}

async function init(){
  try{
    const meals=await fetch('meals.json').then(r=>r.json());
    allMeals=meals.sort((a,b)=>calcFreshness(a).days-calcFreshness(b).days);
    render();
  }catch(e){
    document.getElementById('app').innerHTML=`<div class="loading">Could not load meals.json</div>`;
  }
}
init();
</script>
</body>
</html>
