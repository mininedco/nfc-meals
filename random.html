<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Tonight's Meal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0D1117; --card:#1C2333; --card2:#161C27;
      --teal:#1D9E75; --teal-dim:rgba(29,158,117,0.12); --teal-border:rgba(29,158,117,0.30);
      --teal-glow:rgba(29,158,117,0.20);
      --white:#EFF1F5; --white-dim:rgba(239,241,245,0.55); --gray:#7A8899;
      --warn:#E8960C; --warn-dim:rgba(232,150,12,0.14); --warn-border:rgba(232,150,12,0.35);
      --danger:#E05252;
      --radius-lg:20px; --radius-md:14px; --radius-sm:10px;
      --font:'Lexend',system-ui,sans-serif;
    }
    html { background: var(--bg); }
    body { background:var(--bg); color:var(--white); font-family:var(--font); min-height:100vh; max-width:430px; margin:0 auto; padding-bottom:48px; -webkit-font-smoothing:antialiased; }

    /* ── Top nav ── */
    .top-nav { display:flex; align-items:center; justify-content:space-between; padding:20px 18px 0; }
    .back-btn { display:flex; align-items:center; gap:6px; color:var(--teal); font-size:14px; font-weight:600; text-decoration:none; -webkit-tap-highlight-color:transparent; }
    .nfc-badge { display:flex; flex-direction:column; align-items:center; gap:2px; background:var(--card); border:1.5px solid var(--teal-border); border-radius:12px; padding:7px 12px; font-size:10px; font-weight:800; color:var(--teal); letter-spacing:0.08em; line-height:1; }

    /* ── Hero ── */
    .hero { display:flex; flex-direction:column; align-items:center; padding:32px 18px 0; position:relative; }
    .glow-ring { width:160px; height:160px; border-radius:50%; background:radial-gradient(circle,var(--teal-glow) 0%,transparent 70%); display:flex; align-items:center; justify-content:center; position:relative; margin-bottom:4px; }
    .glow-ring::before { content:''; position:absolute; inset:-2px; border-radius:50%; border:1.5px solid var(--teal-border); }
    .glow-ring::after { content:''; position:absolute; inset:-10px; border-radius:50%; border:1px solid rgba(29,158,117,0.12); }
    .dice-icon { color:var(--teal); line-height:0; filter:drop-shadow(0 0 12px rgba(29,158,117,0.5)); }
    .hero-title { font-size:clamp(30px,8vw,38px); font-weight:800; letter-spacing:-1px; color:var(--white); margin-top:20px; text-align:center; }
    .selected-badge { display:inline-flex; align-items:center; gap:6px; margin-top:12px; padding:8px 20px; background:var(--teal); color:#0D1117; border-radius:100px; font-size:13px; font-weight:800; letter-spacing:0.02em; }

    /* ── Meal reveal card ── */
    .reveal-card { margin:24px 18px 0; background:var(--card); border-radius:var(--radius-lg); border:1.5px solid var(--teal-border); overflow:hidden; }
    .reveal-strip { height:4px; background:var(--teal); }
    .reveal-body { padding:18px 16px 16px; }
    .reveal-name { font-size:clamp(28px,7vw,36px); font-weight:800; letter-spacing:-1px; color:var(--white); line-height:1.05; }
    .reveal-category { display:inline-flex; align-items:center; margin-top:10px; padding:5px 14px; background:var(--teal-dim); border:1px solid var(--teal-border); border-radius:100px; font-size:12px; font-weight:700; color:var(--teal); }
    .reveal-chips { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:14px; }
    .reveal-chip { background:var(--card2); border-radius:var(--radius-md); padding:10px 6px; display:flex; flex-direction:column; align-items:center; gap:5px; }
    .chip-icon { color:var(--teal); line-height:0; }
    .chip-val { font-size:12px; font-weight:700; color:var(--white); text-align:center; line-height:1.2; }
    .chip-sub { font-size:10px; font-weight:500; color:var(--gray); text-align:center; margin-top:-2px; }
    .freshness-row { display:flex; align-items:center; gap:8px; margin-top:14px; padding:10px 12px; background:var(--card2); border-radius:var(--radius-sm); font-size:13px; font-weight:600; }
    .freshness-row.teal { color:var(--teal); }
    .freshness-row.warn { color:var(--warn); }
    .freshness-row.danger { color:var(--danger); }

    /* ── Buttons ── */
    .btn-section { padding:20px 18px 0; display:flex; flex-direction:column; gap:10px; }
    .btn-primary { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:17px; background:var(--teal); color:#0D1117; border-radius:var(--radius-md); font-family:var(--font); font-size:16px; font-weight:800; text-decoration:none; -webkit-tap-highlight-color:transparent; transition:opacity 0.15s; }
    .btn-primary:active { opacity:0.85; }
    .btn-outline { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:15px; background:transparent; color:var(--teal); border:1.5px solid var(--teal-border); border-radius:var(--radius-md); font-family:var(--font); font-size:15px; font-weight:700; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:background 0.15s; }
    .btn-outline:active { background:var(--teal-dim); }

    /* ── Footer hint ── */
    .footer-hint { padding:16px 18px 0; text-align:center; }
    .hint-main { font-size:13px; color:var(--gray); font-weight:500; }
    .hint-sub { font-size:13px; color:var(--teal); font-weight:600; margin-top:4px; }

    /* ── Loading ── */
    .loading { text-align:center; padding:100px 24px; color:var(--gray); font-size:15px; }
  </style>
</head>
<body>
<div id="app"><div class="loading">Picking your meal…</div></div>

<script>
const I = {
  back:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>`,
  nfc:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 6l4 4-4 4"/><path d="M5 10h14"/><path d="M19 6l4 4-4 4"/></svg>`,
  dice:`<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8" cy="8" r="1.4" fill="currentColor"/><circle cx="16" cy="8" r="1.4" fill="currentColor"/><circle cx="8" cy="16" r="1.4" fill="currentColor"/><circle cx="16" cy="16" r="1.4" fill="currentColor"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/></svg>`,
  shuffle:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>`,
  arrow:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`,
  star:`<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
  fork:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="8" y1="2" x2="8" y2="10"/><path d="M5 2v4a3 3 0 006 0V2"/><line x1="8" y1="10" x2="8" y2="22"/><line x1="16" y1="2" x2="16" y2="22"/></svg>`,
  flame:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2c0 6-6 8-6 14a6 6 0 0012 0c0-6-6-8-6-14z"/></svg>`,
  muscle:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6.5 6.5c0-1.1.9-2 2-2h7c1.1 0 2 .9 2 2v1c0 1.1-.9 2-2 2h-7c-1.1 0-2-.9-2-2v-1z"/><path d="M6.5 7.5v9a2 2 0 004 0v-4h3v4a2 2 0 004 0v-9"/></svg>`,
  snow:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 7l-5 5-5-5"/><path d="M17 17l-5-5-5 5"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M7 7l5 5 5-5"/><path d="M7 17l5-5 5 5"/></svg>`,
  check:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
  warn:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
};

function calcFreshness(meal) {
  const frozen = new Date(meal.frozen_date + 'T00:00:00');
  const expiry = new Date(frozen);
  expiry.setDate(expiry.getDate() + meal.expiry_weeks * 7);
  const today = new Date(); today.setHours(0,0,0,0);
  const days = Math.round((expiry - today) / 86400000);
  const state = days <= 0 ? 'danger' : days <= 7 ? 'danger' : days <= 21 ? 'warn' : 'teal';
  const label = days <= 0 ? 'Expired' : days === 1 ? '1 day left' : `${days} days left`;
  const badge = state === 'teal' ? 'Fresh' : state === 'warn' ? 'Eat Soon' : 'Expiring';
  return { days, state, label, badge };
}

function pickMeal(meals) {
  // Prioritise meals expiring within 21 days; fallback to all
  const urgent = meals.filter(m => {
    const d = calcFreshness(m).days;
    return d > 0 && d <= 21;
  });
  const pool = urgent.length > 0 ? urgent : meals.filter(m => calcFreshness(m).days > 0);
  if (!pool.length) return meals[0];
  return pool[Math.floor(Math.random() * pool.length)];
}

let currentMeal = null;
let allMeals = [];

function frozenFmt(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function render(meal) {
  currentMeal = meal;
  const f = calcFreshness(meal);
  const freshIcon = f.state !== 'teal' ? I.warn : I.check;

  document.title = `Tonight: ${meal.name}`;
  document.getElementById('app').innerHTML = `
    <nav class="top-nav">
      <a href="index.html" class="back-btn">${I.back} Freezer</a>
      <div class="nfc-badge">${I.nfc} NFC</div>
    </nav>

    <div class="hero">
      <div class="glow-ring">
        <span class="dice-icon">${I.dice}</span>
      </div>
      <h1 class="hero-title">Tonight's Meal</h1>
      <div class="selected-badge">${I.star} Randomly Selected ${I.star}</div>
    </div>

    <div class="reveal-card">
      <div class="reveal-strip"></div>
      <div class="reveal-body">
        <h2 class="reveal-name">${meal.name}</h2>
        <span class="reveal-category">${meal.category}</span>
        <div class="reveal-chips">
          <div class="reveal-chip">
            <span class="chip-icon">${I.fork}</span>
            <span class="chip-val">${meal.portion}</span>
            <span class="chip-sub">portion</span>
          </div>
          <div class="reveal-chip">
            <span class="chip-icon">${I.flame}</span>
            <span class="chip-val">${meal.calories}</span>
            <span class="chip-sub">cal</span>
          </div>
          <div class="reveal-chip">
            <span class="chip-icon">${I.muscle}</span>
            <span class="chip-val">${meal.protein}g</span>
            <span class="chip-sub">protein</span>
          </div>
          <div class="reveal-chip">
            <span class="chip-icon">${I.snow}</span>
            <span class="chip-val">Frozen</span>
            <span class="chip-sub">${frozenFmt(meal.frozen_date)}</span>
          </div>
        </div>
        <div class="freshness-row ${f.state}">
          ${freshIcon} ${f.badge} — ${f.label}
        </div>
      </div>
    </div>

    <div class="btn-section">
      <a class="btn-primary" href="meal.html?id=${meal.id}">
        View Full Recipe ${I.arrow}
      </a>
      <button class="btn-outline" id="pickAgain">
        ${I.shuffle} Pick Another Meal
      </button>
    </div>

    <div class="footer-hint">
      <p class="hint-main">Prioritises meals expiring soonest</p>
      <p class="hint-sub">Tap tag again for a new pick</p>
    </div>
  `;

  document.getElementById('pickAgain').addEventListener('click', () => {
    const next = pickMeal(allMeals.filter(m => m.id !== currentMeal.id));
    render(next);
  });
}

async function init() {
  try {
    allMeals = await fetch('meals.json').then(r => r.json());
    render(pickMeal(allMeals));
  } catch(e) {
    document.getElementById('app').innerHTML =
      `<div class="loading">Could not load meals.<br><a href="index.html" style="color:var(--teal)">← Back to freezer</a></div>`;
  }
}

init();
</script>
</body>
</html>
